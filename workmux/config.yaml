nerdfont: true

agents:
  claude: 'IS_SANDBOX=1 claude --dangerously-skip-permissions'
  codex: 'codex --yolo'

# Pane layout for new worktree windows. <agent> runs the configured agent
# (default: claude). Required when using `workmux add -p "<prompt>"`.
panes:
  - command: <agent>
    focus: true
